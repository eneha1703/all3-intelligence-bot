name: Weekly Claude Review

on:
  workflow_dispatch:
    inputs:
      week_key:
        description: ISO week key, for example 2026-W20
        required: false
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      CLAUDE_DIGEST_ENABLED: "true"
      CLAUDE_DIGEST_MODEL: "claude-sonnet-4-6"
      CLAUDE_DIGEST_TIMEOUT_SECONDS: "60"
      CLAUDE_DIGEST_MAX_TOKENS: "2200"
      DATABASE_PATH: data/all3_radar.db
      TELEGRAM_GROUP_CURATION_ENABLED: ${{ vars.TELEGRAM_GROUP_CURATION_ENABLED }}
      TELEGRAM_GROUP_MESSAGE_INGEST_ENABLED: ${{ vars.TELEGRAM_GROUP_MESSAGE_INGEST_ENABLED }}
      TELEGRAM_REACTION_SHORTLIST_ENABLED: ${{ vars.TELEGRAM_REACTION_SHORTLIST_ENABLED }}
      TELEGRAM_SHORTLIST_REACTION_ALLOWLIST: ${{ vars.TELEGRAM_SHORTLIST_REACTION_ALLOWLIST }}
      TELEGRAM_SHORTLIST_WINDOW_DAYS: ${{ vars.TELEGRAM_SHORTLIST_WINDOW_DAYS }}
      TELEGRAM_SHORTLIST_MIN_UNIQUE_REACTORS: ${{ vars.TELEGRAM_SHORTLIST_MIN_UNIQUE_REACTORS }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure data directory exists
        run: mkdir -p data
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Initialize databases
        run: |
          python -m all3_radar.app.admin_cli db init
          python -m all3_radar.app.editorial_memory_cli db init
          python -m all3_radar.app.editorial_memory_cli evidence seed-digest-examples
          python -m all3_radar.app.editorial_memory_cli evidence seed-manual-examples
      - name: Log DB mode after init
        run: |
          if [ -n "${TURSO_DATABASE_URL}" ]; then
            echo "Bot 1 is using remote Turso state."
          else
            echo "Bot 1 is using local SQLite state."
            ls -lh data/all3_radar.db
          fi
      - name: Build weekly Claude review
        run: python -m all3_radar.app.editorial_memory_cli review build --week "${{ github.event.inputs.week_key || 'latest' }}"
      - name: Upload weekly review artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-claude-review-${{ github.event.inputs.week_key || 'latest' }}
          path: data/weekly_claude_review_*.md
          if-no-files-found: error
          retention-days: 2

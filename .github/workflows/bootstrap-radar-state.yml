name: Bootstrap Radar State

on:
  workflow_dispatch:
    inputs:
      bootstrap_mode:
        description: "Where to load the seed DB from"
        required: true
        default: "repository_zip"
        type: choice
        options:
          - repository_zip
          - source_artifact
      repository_zip_path:
        description: "Path to a committed zip file in the selected branch when bootstrap_mode=repository_zip"
        required: false
        default: ".github/bootstrap/radar-db-seed.zip"
        type: string
      target_ref_name:
        description: "Branch name whose radar cache should be seeded"
        required: true
        default: "main"
        type: string
      source_repository:
        description: "Source repository in owner/name format"
        required: false
        default: "togetherwithyouapi-commits/new_all3_radar_bot"
        type: string
      source_run_id:
        description: "GitHub Actions run id whose radar-db artifact should seed the new repo"
        required: false
        type: string
      artifact_name:
        description: "Optional artifact name; defaults to radar-db-${source_run_id}"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  bootstrap-state:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: data/all3_radar.db
      BOOTSTRAP_MODE: ${{ github.event.inputs.bootstrap_mode }}
      REPOSITORY_ZIP_PATH: ${{ github.event.inputs.repository_zip_path }}
      TARGET_REF_NAME: ${{ github.event.inputs.target_ref_name }}
      SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
      SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
      ARTIFACT_NAME_INPUT: ${{ github.event.inputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data source-artifact

      - name: Resolve artifact name
        if: env.BOOTSTRAP_MODE == 'source_artifact'
        id: artifact-name
        shell: bash
        run: |
          if [ -n "${ARTIFACT_NAME_INPUT}" ]; then
            echo "name=${ARTIFACT_NAME_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "name=radar-db-${SOURCE_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download source DB artifact
        if: env.BOOTSTRAP_MODE == 'source_artifact'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.SOURCE_REPO_ACTIONS_READ_TOKEN }}
          repository: ${{ env.SOURCE_REPOSITORY }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ steps.artifact-name.outputs.name }}
          path: source-artifact

      - name: Prepare seeded DB from repository zip
        if: env.BOOTSTRAP_MODE == 'repository_zip'
        shell: bash
        run: |
          if [ ! -f "${REPOSITORY_ZIP_PATH}" ]; then
            echo "Expected committed zip file at ${REPOSITORY_ZIP_PATH}"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          unzip -j "${REPOSITORY_ZIP_PATH}" "all3_radar.db" -d data
          ls -lh data/all3_radar.db

      - name: Prepare seeded DB from source artifact
        if: env.BOOTSTRAP_MODE == 'source_artifact'
        shell: bash
        run: |
          DB_PATH="$(find source-artifact -type f -name 'all3_radar.db' | head -n 1 || true)"
          if [ -z "${DB_PATH}" ]; then
            echo "Expected all3_radar.db inside artifact ${ARTIFACT_NAME_INPUT:-radar-db-${SOURCE_RUN_ID}}"
            find source-artifact -maxdepth 3 -type f | sort || true
            exit 1
          fi

          cp "${DB_PATH}" data/all3_radar.db
          ls -lh data/all3_radar.db

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Initialize database schema safely
        run: python -m all3_radar.app.admin_cli db init

      - name: Save seeded Bot 1 state
        uses: actions/cache/save@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ env.TARGET_REF_NAME }}-${{ github.run_id }}

      - name: Upload seeded DB snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bootstrapped-radar-db-${{ github.run_id }}
          path: data/all3_radar.db
          if-no-files-found: error
          retention-days: 1

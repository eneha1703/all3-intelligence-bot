name: Telegram Shortlist Poll

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: telegram-shortlist-poll-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  poll-shortlist-updates:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
      DATABASE_PATH: data/all3_radar.db
      TELEGRAM_GROUP_CURATION_ENABLED: ${{ vars.TELEGRAM_GROUP_CURATION_ENABLED }}
      TELEGRAM_GROUP_MESSAGE_INGEST_ENABLED: ${{ vars.TELEGRAM_GROUP_MESSAGE_INGEST_ENABLED }}
      TELEGRAM_REACTION_SHORTLIST_ENABLED: ${{ vars.TELEGRAM_REACTION_SHORTLIST_ENABLED }}
      TELEGRAM_SHORTLIST_REACTION_ALLOWLIST: ${{ vars.TELEGRAM_SHORTLIST_REACTION_ALLOWLIST }}
      TELEGRAM_SHORTLIST_WINDOW_DAYS: ${{ vars.TELEGRAM_SHORTLIST_WINDOW_DAYS }}
      TELEGRAM_SHORTLIST_MIN_UNIQUE_REACTORS: ${{ vars.TELEGRAM_SHORTLIST_MIN_UNIQUE_REACTORS }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore Bot 1 state
        id: restore-radar-db
        uses: actions/cache/restore@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            radar-db-${{ github.ref_name }}-

      - name: Log DB restore status
        run: |
          if [ -f data/all3_radar.db ]; then
            echo "Bot 1 DB file is present before Telegram polling."
            ls -lh data/all3_radar.db
          else
            echo "Bot 1 DB file is not present before Telegram polling."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Initialize database
        run: python -m all3_radar.app.admin_cli db init

      - name: Poll Telegram shortlist updates
        run: python -m all3_radar.app.radar_cli telegram-poll-updates --limit 50 --timeout-seconds 2

      - name: Check DB file for persistence steps
        if: always()
        id: db-file
        run: |
          if [ -f data/all3_radar.db ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Bot 1 DB snapshot available for save/upload."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Bot 1 DB snapshot missing after Telegram polling."
          fi

      - name: Save Bot 1 state
        if: success() && steps.db-file.outputs.exists == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload DB snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-shortlist-poll-${{ github.run_id }}
          path: data/all3_radar.db
          if-no-files-found: ignore
          retention-days: 3

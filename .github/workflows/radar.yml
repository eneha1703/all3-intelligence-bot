name: News Radar

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Collect and score news without sending Telegram cards"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      dry_run:
        description: "Collect and score news without sending Telegram cards"
        required: false
        default: false
        type: boolean

concurrency:
  group: news-radar-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
      TELEGRAM_ALERT_CHAT_IDS: ${{ vars.TELEGRAM_ALERT_CHAT_IDS }}
      CLAUDE_EDITORIAL_ENABLED: ${{ vars.CLAUDE_EDITORIAL_ENABLED }}
      CLAUDE_EDITORIAL_MAX_CANDIDATES: ${{ vars.CLAUDE_EDITORIAL_MAX_CANDIDATES }}
      CLAUDE_EDITORIAL_MODEL: ${{ vars.CLAUDE_EDITORIAL_MODEL }}
      CLAUDE_EDITORIAL_TIMEOUT_SECONDS: ${{ vars.CLAUDE_EDITORIAL_TIMEOUT_SECONDS }}
      CLAUDE_EDITORIAL_MAX_TOKENS: ${{ vars.CLAUDE_EDITORIAL_MAX_TOKENS }}
      CLAUDE_FINAL_CARD_ENABLED: ${{ vars.CLAUDE_FINAL_CARD_ENABLED }}
      CLAUDE_FINAL_CARD_MAX_CANDIDATES: ${{ vars.CLAUDE_FINAL_CARD_MAX_CANDIDATES }}
      CLAUDE_FINAL_CARD_MODEL: ${{ vars.CLAUDE_FINAL_CARD_MODEL }}
      CLAUDE_FINAL_CARD_TIMEOUT_SECONDS: ${{ vars.CLAUDE_FINAL_CARD_TIMEOUT_SECONDS }}
      CLAUDE_FINAL_CARD_MAX_TOKENS: ${{ vars.CLAUDE_FINAL_CARD_MAX_TOKENS }}
      DATABASE_PATH: data/all3_radar.db
      ALLOW_COLLECTED_AT_FALLBACK: "false"
      GOOGLE_COMPETITOR_CHECK_ENABLED: "true"
      GOOGLE_COMPETITOR_SEND_ENABLED: "false"
      RADAR_DRY_RUN: ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') || inputs.dry_run) && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"
          date -u

      - name: Ensure data directory exists
        run: mkdir -p data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Initialize database
        run: python -m all3_radar.app.admin_cli db init

      - name: Log DB mode after init
        run: |
          if [ -n "${TURSO_DATABASE_URL}" ]; then
            echo "Bot 1 is using remote Turso state."
          else
            echo "Bot 1 is using local SQLite state."
            ls -lh data/all3_radar.db
          fi

      - name: Run radar
        run: |
          if [ "${RADAR_DRY_RUN}" = "true" ]; then
            python -m all3_radar.app.radar_cli run --dry-run
          else
            python -m all3_radar.app.radar_cli run
          fi

      - name: Upload DB snapshot
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: radar-db-${{ github.run_id }}
          path: |
            data/all3_radar.db
            data/radar-run-audit-*.md
          if-no-files-found: ignore
          retention-days: 1

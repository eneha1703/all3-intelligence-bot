name: News Radar

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Collect and score news without sending Telegram cards"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 * * * *"

concurrency:
  group: news-radar-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_ALERT_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
      TELEGRAM_ALERT_CHAT_IDS: ${{ vars.TELEGRAM_ALERT_CHAT_IDS }}
      CLAUDE_EDITORIAL_ENABLED: ${{ vars.CLAUDE_EDITORIAL_ENABLED }}
      CLAUDE_EDITORIAL_MAX_CANDIDATES: ${{ vars.CLAUDE_EDITORIAL_MAX_CANDIDATES }}
      CLAUDE_EDITORIAL_MODEL: ${{ vars.CLAUDE_EDITORIAL_MODEL }}
      CLAUDE_EDITORIAL_TIMEOUT_SECONDS: ${{ vars.CLAUDE_EDITORIAL_TIMEOUT_SECONDS }}
      CLAUDE_EDITORIAL_MAX_TOKENS: ${{ vars.CLAUDE_EDITORIAL_MAX_TOKENS }}
      CLAUDE_FINAL_CARD_ENABLED: ${{ vars.CLAUDE_FINAL_CARD_ENABLED }}
      CLAUDE_FINAL_CARD_MAX_CANDIDATES: ${{ vars.CLAUDE_FINAL_CARD_MAX_CANDIDATES }}
      CLAUDE_FINAL_CARD_MODEL: ${{ vars.CLAUDE_FINAL_CARD_MODEL }}
      CLAUDE_FINAL_CARD_TIMEOUT_SECONDS: ${{ vars.CLAUDE_FINAL_CARD_TIMEOUT_SECONDS }}
      CLAUDE_FINAL_CARD_MAX_TOKENS: ${{ vars.CLAUDE_FINAL_CARD_MAX_TOKENS }}
      DATABASE_PATH: data/all3_radar.db
      ALLOW_COLLECTED_AT_FALLBACK: "false"
      GOOGLE_COMPETITOR_CHECK_ENABLED: "true"
      GOOGLE_COMPETITOR_SEND_ENABLED: "false"
      RADAR_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore Bot 1 state
        id: restore-radar-db
        uses: actions/cache/restore@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            radar-db-${{ github.ref_name }}-

      - name: Log DB restore status
        run: |
          if [ -f data/all3_radar.db ]; then
            echo "Bot 1 DB file is present before run."
            ls -lh data/all3_radar.db
          else
            echo "Bot 1 DB file is not present before run."
          fi

          if [ "${{ steps.restore-radar-db.outputs.cache-hit }}" = "true" ]; then
            echo "Bot 1 state restored from exact cache key."
          elif [ -f data/all3_radar.db ]; then
            echo "Bot 1 state restored from fallback cache key."
          else
            echo "Bot 1 state not restored from cache; starting with fresh local DB."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Initialize database
        run: python -m all3_radar.app.admin_cli db init

      - name: Log DB status after init
        run: |
          if [ -f data/all3_radar.db ]; then
            echo "Bot 1 DB ready after init."
            ls -lh data/all3_radar.db
          else
            echo "Bot 1 DB file is still missing after init."
            exit 1
          fi

      - name: Run radar
        run: |
          if [ "${RADAR_DRY_RUN}" = "true" ]; then
            python -m all3_radar.app.radar_cli run --dry-run
          else
            python -m all3_radar.app.radar_cli run
          fi

      - name: Check DB file for persistence steps
        if: always()
        id: db-file
        run: |
          if [ -f data/all3_radar.db ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Bot 1 DB snapshot available for save/upload."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Bot 1 DB snapshot missing after run."
          fi

      - name: Save Bot 1 state
        if: success() && steps.db-file.outputs.exists == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload DB snapshot
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: radar-db-${{ github.run_id }}
          path: |
            data/all3_radar.db
            data/radar-run-audit-*.md
          if-no-files-found: ignore
          retention-days: 1

name: Radar State Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "52 2 * * *"

concurrency:
  group: radar-state-snapshot-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore Bot 1 state
        id: restore-radar-db
        uses: actions/cache/restore@v4
        with:
          path: data/all3_radar.db
          key: radar-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            radar-db-${{ github.ref_name }}-

      - name: Verify restored database
        run: |
          if [ ! -f data/all3_radar.db ]; then
            echo "No cached Bot 1 DB snapshot was available."
            exit 1
          fi
          ls -lh data/all3_radar.db

      - name: Build snapshot manifest
        shell: python
        run: |
          import hashlib
          import json
          import sqlite3
          from pathlib import Path

          db_path = Path("data/all3_radar.db")
          with db_path.open("rb") as handle:
              sha256 = hashlib.sha256(handle.read()).hexdigest()

          connection = sqlite3.connect(db_path)
          table_rows = {}
          try:
              table_names = [
                  row[0]
                  for row in connection.execute(
                      """
                      SELECT name
                      FROM sqlite_master
                      WHERE type = 'table' AND name NOT LIKE 'sqlite_%'
                      ORDER BY name
                      """
                  ).fetchall()
              ]
              for table_name in table_names:
                  table_rows[table_name] = connection.execute(
                      f'SELECT COUNT(*) FROM "{table_name}"'
                  ).fetchone()[0]
          finally:
              connection.close()

          manifest = {
              "database_path": str(db_path),
              "file_size_bytes": db_path.stat().st_size,
              "sha256": sha256,
              "table_rows": table_rows,
          }
          Path("data/radar-state-snapshot-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

      - name: Upload radar state snapshot
        uses: actions/upload-artifact@v4
        with:
          name: radar-state-snapshot-${{ github.run_id }}
          path: |
            data/all3_radar.db
            data/radar-state-snapshot-manifest.json
          if-no-files-found: error
          retention-days: 7

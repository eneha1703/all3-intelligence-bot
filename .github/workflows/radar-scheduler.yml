name: News Radar Scheduler

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Collect and score news without sending Telegram cards"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 * * * *"
    - cron: "43 * * * *"

jobs:
  trigger-radar:
    uses: ./.github/workflows/radar.yml
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets: inherit

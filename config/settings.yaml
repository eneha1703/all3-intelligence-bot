app:
  timezone: Europe/Belgrade
  database_path: data/all3_radar.db
  log_level: INFO

radar:
  lookback_hours: 30
  require_published_ts: true
  allow_collected_at_fallback: false
  max_cards_per_run: 20
  shortlist_size_before_gemini: 25
  google_competitor_check_enabled: false
  google_competitor_send_enabled: false

digest:
  stories_per_digest: 5
  shortlist_size_before_claude: 20
  require_canonical_events: true
  claude_digest_enabled: false
  claude_digest_max_input_items: 12
  claude_digest_full_text_enabled: true
  claude_digest_full_text_max_candidates: 10
  claude_digest_full_text_max_chars: 3500
  claude_digest_full_text_timeout_seconds: 8

telegram:
  parse_mode: HTML
  disable_web_page_preview: false

telegram_group_curation:
  enabled: false
  message_ingest_enabled: false
  reaction_shortlist_enabled: false
  shortlist_reaction_allowlist:
    - "emoji:star"
  shortlist_window_days: 7
  shortlist_min_unique_reactors: 1

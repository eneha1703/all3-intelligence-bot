stages:
  - test
  - verify

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DATABASE_PATH: "data/all3_radar.db"
  ALLOW_COLLECTED_AT_FALLBACK: "false"
  GOOGLE_COMPETITOR_CHECK_ENABLED: "true"
  GOOGLE_COMPETITOR_SEND_ENABLED: "false"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

.python_job:
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-build-isolation -e .[dev]

tests:
  extends: .python_job
  stage: test
  script:
    - python -m pytest

radar_dry_run:
  extends: .python_job
  stage: verify
  when: manual
  script:
    - mkdir -p data
    - python -m all3_radar.app.admin_cli db init
    - python -m all3_radar.app.radar_cli run --dry-run
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - data/radar-run-audit-*.md

web_discovery_report:
  extends: .python_job
  stage: verify
  when: manual
  variables:
    WEB_DISCOVERY_OUTPUT_DIR: "data/web-discovery"
  script:
    - mkdir -p "$WEB_DISCOVERY_OUTPUT_DIR"
    - python -m all3_radar.app.radar_cli discover-web --output-dir "$WEB_DISCOVERY_OUTPUT_DIR" --allow-failure-report
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - data/web-discovery/

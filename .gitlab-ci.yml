stages:
  - test
  - run

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

.python_job:
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-build-isolation -e .[dev]

.stateful_job:
  extends: .python_job
  stage: run
  resource_group: radar-state
  variables:
    DATABASE_PATH: "data/all3_radar.db"
    STATE_SEED_ZIP: ".gitlab/state-seed/radar-state-snapshot-26436397276.zip"
    ALLOW_COLLECTED_AT_FALLBACK: "false"
    GOOGLE_COMPETITOR_CHECK_ENABLED: "true"
    GOOGLE_COMPETITOR_SEND_ENABLED: "false"
    CLAUDE_EDITORIAL_ENABLED: "true"
    CLAUDE_EDITORIAL_MAX_CANDIDATES: "12"
    CLAUDE_EDITORIAL_MODEL: "claude-sonnet-4-6"
    CLAUDE_EDITORIAL_TIMEOUT_SECONDS: "30"
    CLAUDE_EDITORIAL_MAX_TOKENS: "900"
    CLAUDE_FINAL_CARD_ENABLED: "true"
    CLAUDE_FINAL_CARD_MAX_CANDIDATES: "15"
    CLAUDE_FINAL_CARD_MODEL: "claude-sonnet-4-6"
    CLAUDE_FINAL_CARD_TIMEOUT_SECONDS: "30"
    CLAUDE_FINAL_CARD_MAX_TOKENS: "900"
    CLAUDE_DIGEST_ENABLED: "true"
    CLAUDE_DIGEST_MODEL: "claude-sonnet-4-6"
    CLAUDE_DIGEST_TIMEOUT_SECONDS: "60"
    CLAUDE_DIGEST_MAX_INPUT_ITEMS: "16"
    CLAUDE_DIGEST_MAX_TOKENS: "2200"
    TELEGRAM_GROUP_CURATION_ENABLED: "true"
    TELEGRAM_GROUP_MESSAGE_INGEST_ENABLED: "true"
    TELEGRAM_REACTION_SHORTLIST_ENABLED: "true"
    TELEGRAM_SHORTLIST_REACTION_ALLOWLIST: "emoji:star"
    TELEGRAM_SHORTLIST_WINDOW_DAYS: "7"
    TELEGRAM_SHORTLIST_MIN_UNIQUE_REACTORS: "1"
    WEB_DISCOVERY_OUTPUT_DIR: "data/web-discovery"
    WEB_DISCOVERY_MAX_SEARCH_USES: "8"
    WEB_DISCOVERY_MAX_CANDIDATES: "20"
    WEB_DISCOVERY_MAX_NEW_CANDIDATES: "12"
    WEB_DISCOVERY_TIMEOUT_SECONDS: "180"
    WEB_DISCOVERY_MAX_TOKENS: "2500"
    WEB_DISCOVERY_TAVILY_SEARCH_DEPTH: "basic"
    WEB_DISCOVERY_TAVILY_INCLUDE_RAW_CONTENT: "true"
  cache:
    - key: "$CI_COMMIT_REF_SLUG"
      paths:
        - .cache/pip/
    - key: "radar-state-main"
      paths:
        - data/all3_radar.db
      policy: pull-push
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-build-isolation -e .[dev]
    - python scripts/gitlab_ci_state.py restore --seed-zip "$STATE_SEED_ZIP" --database "$DATABASE_PATH"
    - python -m all3_radar.app.admin_cli db init

tests:
  extends: .python_job
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  script:
    - python -m pytest

radar:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "radar"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python -m all3_radar.app.radar_cli run
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - data/radar-run-audit-*.md

radar_dry_run:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "radar_dry_run"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python -m all3_radar.app.radar_cli run --dry-run
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - data/radar-run-audit-*.md

telegram_shortlist_poll:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "telegram_shortlist_poll"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python -m all3_radar.app.radar_cli telegram-poll-updates --limit 50 --timeout-seconds 2

web_discovery_report:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "web_discovery_report"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - mkdir -p "$WEB_DISCOVERY_OUTPUT_DIR"
    - python -m all3_radar.app.radar_cli discover-web --output-dir "$WEB_DISCOVERY_OUTPUT_DIR" --allow-failure-report
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - data/web-discovery/

web_discovery_preview:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "web_discovery_preview"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - mkdir -p "$WEB_DISCOVERY_OUTPUT_DIR"
    - python -m all3_radar.app.radar_cli discover-web --output-dir "$WEB_DISCOVERY_OUTPUT_DIR" --allow-failure-report
    - python scripts/web_discovery_preview.py --input-dir "$WEB_DISCOVERY_OUTPUT_DIR" --output "$WEB_DISCOVERY_OUTPUT_DIR/web-discovery-telegram-preview.md"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - data/web-discovery/

state_snapshot:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "state_snapshot"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python scripts/gitlab_ci_state.py snapshot --database "$DATABASE_PATH" --output-dir data/state-snapshot --label "radar-state-snapshot-$CI_PIPELINE_ID"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - data/state-snapshot/

weekly_digest:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "weekly_digest"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python -m all3_radar.app.digest_cli build --week "${WEEK_KEY:-latest}"
    - python scripts/send_weekly_digest.py
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - data/weekly_digest_*.md

weekly_claude_review:
  extends: .stateful_job
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "weekly_claude_review"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual
  script:
    - python -m all3_radar.app.editorial_memory_cli db init
    - python -m all3_radar.app.editorial_memory_cli evidence seed-digest-examples
    - python -m all3_radar.app.editorial_memory_cli evidence seed-manual-examples
    - python -m all3_radar.app.editorial_memory_cli review build --week "${WEEK_KEY:-latest}"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - data/weekly_claude_review_*.md
      - data/editorial_memory.db

stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-build-isolation -e .[dev]
  script:
    - python -m pytest
